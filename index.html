<!DOCTYPE html>
<html>
<head>
<style>
  /* CSS to remove borders and set dimensions */
  .custom-iframe {
    width: 500px;
    height: 500px;
    border: none; /* This removes the default border */
  }
</style>
</head>
<body>

  <h2>My Website Iframe</h2>

  <iframe 
    src="https://www.w3schools.com" 
    class="custom-iframe" 
    title="External Website Content">
  </iframe>

</body>
</html>
